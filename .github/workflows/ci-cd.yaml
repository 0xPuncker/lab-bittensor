name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 0xpuncker/val-bittensor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update K8s image tag
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          # Get the short commit SHA
          IMAGE_TAG="${{ github.sha }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          echo "Updating K8s manifests to use image tag: ${SHORT_SHA}"

          # Update validator-statefulset.yaml
          sed -i "s|image: ghcr.io/0xpuncker/val-bittensor:.*|image: ghcr.io/0xpuncker/val-bittensor:${SHORT_SHA}|g" k8s/validator-statefulset.yaml

          # Show the changes
          git diff k8s/validator-statefulset.yaml

      - name: Commit and push image tag update
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/validator-statefulset.yaml
          git commit -m "chore(k8s): update image tag to ${GITHUB_SHA:0:7} [ci skip]"
          git push
