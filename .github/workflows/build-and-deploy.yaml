name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/0xpuncker/val-bittensor
  PYTHON_VERSION: "3.11"
  # Use Node.js 24 runtime for all JS-based actions (Node 20 deprecated Jun 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sensors:
    name: Run Sensors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy ruff pytest pip-audit bandit[toml] detect-secrets
          pip install -r requirements.txt
          # Pre-install commonly used packages for faster subsequent runs
          pip install --upgrade bittensor kubernetes

      - name: Typecheck (mypy)
        run: mypy --config-file mypy.ini || true

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest --tb=short -q --ignore=tests/integration/ --ignore=tests/test_smoke.py || true

      - name: Audit (pip-audit)
        run: pip-audit --desc || true

      - name: Security (bandit)
        run: bandit -r . -c pyproject.toml -ll || true

      - name: Secret scan
        run: detect-secrets scan --baseline .secrets.baseline || true

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sensors
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image tag
        id: tag
        run: |
          # docker/metadata-action outputs newline-separated tags; grab the sha tag (first line)
          IMAGE_TAG=$(printf '%s' "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          # Write to a file so it can be uploaded as an artifact
          echo "${IMAGE_TAG}" > /tmp/image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: /tmp/image-tag.txt

  update_k8s_manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout val-bittensor
        uses: actions/checkout@v4

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          path: ./artifact

      - name: Set IMAGE_TAG env
        run: |
          # artifact contains the full image reference, e.g. ghcr.io/0xpuncker/val-bittensor:main-abc1234
          IMAGE_TAG=$(cat artifact/image-tag.txt)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Update K8s manifests
        run: |
          echo "Updating K8s manifests to use image: ${IMAGE_TAG}"
          # Use the full IMAGE_TAG (includes branch prefix, e.g. main-abc1234) to match what was pushed
          sed -i "s|image: ghcr.io/0xpuncker/val-bittensor:.*|image: ${IMAGE_TAG}|g" k8s/bittensor-testnet.yaml
          git diff k8s/bittensor-testnet.yaml

      - name: Commit and push K8s manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bittensor-testnet.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): update image tag to ${SHORT_SHA} [ci skip]"
          git push
