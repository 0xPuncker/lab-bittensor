# Cache configuration for GitHub Actions
# This file defines caching strategies for faster CI/CD runs

name: Cache Configuration

on:
  workflow_dispatch:

jobs:
  warm-cache:
    name: Warm up dependency cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy ruff pytest pip-audit bandit[toml] detect-secrets
          pip install -r requirements.txt
          pip install --upgrade bittensor kubernetes

      - name: Verify cache hit
        run: |
          echo "Cache warmed successfully"
          pip list | grep -E "(bittensor|kubernetes|mypy)"