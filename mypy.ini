[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_return_any = False
warn_unused_configs = False
disallow_untyped_defs = False
check_untyped_defs = False

# Allow these specific errors that are known issues in the codebase
disable_error_code = [
    "override",
    "attr-defined",
    "assignment",
    "arg-type",
    "return-value",
    "union-attr",
    "no-redef",
    "name-defined",
    "func-returns-value"
]

# Only check specific directories
files = template,neurons,strategy

# Exclude problematic files
exclude = (?x)(
    docs/|
    tests/|
    setup\.py
)

[mypy-template.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-neurons.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-strategy.*]
disallow_untyped_defs = False
check_untyped_defs = False